<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davi | Memes Gallery</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #0b0f1a;           /* Fundo ultra dark */
            --card: #161b2b;         /* Cor dos cartões */
            --accent: #4f46e5;       /* Azul índigo moderno */
            --text-main: #ffffff; 
            --text-sub: #64748b;     /* Cinza elegante */
        }

        body { 
            margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Minimalista */
        .header { 
            padding: 50px 20px 20px; 
            text-align: center;
        }

        .header span { 
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-sub);
            font-weight: 600;
        }

        /* Grade de Memes Profissional */
        .meme-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 15px;
        }

        .meme-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            aspect-ratio: 1 / 1;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s ease;
        }

        .meme-card:active { transform: scale(0.96); }

        .meme-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        /* Botões Modernos */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
            padding: 0 20px;
        }

        .nav-btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            background: var(--card);
            color: var(--text-main);
            transition: 0.3s;
        }

        .nav-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        .whatsapp-btn {
            background: transparent !important;
            border: 1px solid rgba(37, 211, 102, 0.4) !important;
            color: #25D366 !important;
            margin: 0 auto 40px !important;
            display: block;
            width: fit-content;
        }

        /* Rodapé Elegante */
        .footer { 
            margin-top: auto;
            text-align: center; 
            padding: 40px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
        }

        .profile-container {
            display: inline-block;
            padding: 3px;
            background: linear-gradient(45deg, var(--accent), #ec4899);
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .profile-img { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            display: block;
            object-fit: cover;
            border: 2px solid var(--bg);
        }

        .footer p { 
            font-size: 11px; 
            color: var(--text-sub); 
            letter-spacing: 3px;
            margin: 0;
        }

        /* Modal Estilo Vidro */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content { 
            max-width: 90%;
            max-height: 70%;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        #memeTitle { margin: 20px 0; font-weight: 400; font-size: 14px; color: var(--text-sub); }

        .modal-buttons { display: flex; gap: 10px; }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-share { background: var(--accent); color: white; }
        .btn-close { background: #334155; color: white; }

    </style>
</head>
<body>

<header class="header">
    <span>MEMES CCV</span>
</header>

<div id="memeContainer" class="meme-grid"></div>

<div class="button-group">
    <a href="https://forms.gle/iCHjt7fbsiMbuN867" target="_blank" class="nav-btn primary">Sugerir</a>
    <button onclick="window.location.reload(true)" class="nav-btn">Atualizar</button>
</div>

<a href="https://api.whatsapp.com/send?text=Confere os memes no app do Davi!" target="_blank" class="nav-btn whatsapp-btn">
   Compartilhar App
</a>

<div id="memeModal" class="modal" onclick="if(event.target == this) closeModal()">
    <img id="imgFull" class="modal-content">
    <h3 id="memeTitle"></h3>
    <div class="modal-buttons">
        <button class="btn btn-share" onclick="shareMeme()">Enviar Link</button>
        <button class="btn btn-close" onclick="closeModal()">Voltar</button>
    </div>
</div>

<footer class="footer">
    <div class="profile-container">
        <img src="5021535940282886753.jpg" alt="Davi" class="profile-img">
    </div>
    <p>DAVI • 2026</p>
    <small style="opacity: 0.3; font-size: 9px;">PWA v32</small>
</footer>

<script>
    let currentMeme = { url: '', titulo: '' };

    async function loadMemes() {
        try {
            const response = await fetch('memes.json');
            const memes = await response.json();
            const container = document.getElementById('memeContainer');
            container.innerHTML = '';

            memes.forEach(meme => {
                const div = document.createElement('div');
                div.className = 'meme-card';
                div.innerHTML = `<img src="${meme.url}" alt="${meme.titulo}" loading="lazy">`;
                div.onclick = () => openModal(meme.url, meme.titulo);
                container.appendChild(div);
            });
        } catch (error) {
            document.getElementById('memeContainer').innerHTML = '<p style="text-align:center; color: var(--text-sub);">Modo Offline Ativo</p>';
        }
    }

    function openModal(url, titulo) {
        currentMeme = { url, titulo };
        document.getElementById('imgFull').src = url;
        document.getElementById('memeTitle').innerText = titulo;
        document.getElementById('memeModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('memeModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function shareMeme() {
        const shareUrl = window.location.origin + window.location.pathname;
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Meme do Davi',
                    text: 'Olha esse meme!',
                    url: shareUrl
                });
            } catch (err) {}
        } else {
            navigator.clipboard.writeText(shareUrl);
            alert("Link do app copiado!");
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    loadMemes();
</script>

</body>
</html>
