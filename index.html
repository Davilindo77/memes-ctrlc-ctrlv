<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memes Davi | Oficial</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #020617; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --primary: #3b82f6; 
            --accent: #ef4444;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 10px;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { 
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #3b82f6, #a855f7); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Grade de Miniaturas */
        .meme-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 8px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .meme-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .meme-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* MODAL - A parte que você queria que aumentasse */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999;
            top: 0; left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.95); 
            align-items: center; 
            justify-content: center;
            flex-direction: column;
        }

        .modal-content { 
            width: 95vw !important; /* Quase a largura total da tela */
            max-height: 75vh !important; /* Deixa espaço para os botões */
            object-fit: contain; 
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
        }

        #memeTitle {
            margin: 15px 0;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
        }

        .modal-buttons { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px;
        }

        .btn {
            padding: 12px 25px; 
            border: none; 
            border-radius: 30px;
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-share { background: var(--primary); color: white; }
        .btn-close { background: var(--accent); color: white; }

        .footer { text-align: center; margin-top: 40px; padding: 30px; border-top: 1px solid #1e293b; }
        .footer img { width: 60px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 10px; }
        .footer p { margin: 5px 0; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Memes Davi</h1>
</div>

<div id="memeContainer" class="meme-grid">
    </div>

<div id="memeModal" class="modal" onclick="if(event.target == this) closeModal()">
    <img id="imgFull" class="modal-content">
    <h3 id="memeTitle"></h3>
    <div class="modal-buttons">
        <button class="btn btn-share" onclick="shareMeme()">Compartilhar</button>
        <button class="btn btn-close" onclick="closeModal()">Fechar</button>
    </div>
</div>

<div class="footer">
    <a href="https://forms.gle/HnE7C9dx45wCqPRy5" target="_blank" style="text-decoration: none;">
        <button class="btn" style="background: var(--primary); margin-bottom: 20px; width: 200px;">
            Sugerir um Meme 🚀
        </button>
    </a>
    
    <br>
    <img src="https://github.com/Davilindo77.png" onerror="this.src='https://via.placeholder.com/60'">
    <p>APP FEITO POR DAVI</p>
    <small style="opacity: 0.5">Versão 2.1 - 2024</small>
</div>

<script>
    let currentMeme = { url: '', titulo: '' };

    // Carrega os memes do JSON
    async function loadMemes() {
        try {
            const response = await fetch('memes.json?v=' + Date.now());
            const memes = await response.json();
            const container = document.getElementById('memeContainer');
            container.innerHTML = '';

            memes.forEach(meme => {
                const div = document.createElement('div');
                div.className = 'meme-card';
                div.innerHTML = `<img src="${meme.url}" alt="${meme.titulo}" loading="lazy">`;
                div.onclick = () => openModal(meme.url, meme.titulo);
                container.appendChild(div);
            });
        } catch (error) {
            console.error("Erro:", error);
        }
    }

    // Abre a imagem grande
    function openModal(url, titulo) {
        currentMeme = { url, titulo };
        document.getElementById('imgFull').src = url;
        document.getElementById('memeTitle').innerText = titulo;
        document.getElementById('memeModal').style.display = 'flex';
        // Bloqueia o scroll do fundo
        document.body.style.overflow = 'hidden';
    }

    // Fecha a imagem grande
    function closeModal() {
        document.getElementById('memeModal').style.display = 'none';
        // Libera o scroll
        document.body.style.overflow = 'auto';
    }

    // Função de compartilhar
    async function shareMeme() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: currentMeme.titulo,
                    text: 'Olha esse meme no app do Davi!',
                    url: currentMeme.url
                });
            } catch (err) { console.log("Compartilhamento cancelado"); }
        } else {
            // Se o navegador não suportar, apenas copia o link
            navigator.clipboard.writeText(currentMeme.url);
            alert("Link da imagem copiado!");
        }
    }

    // Registra o Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // Inicia o app
    loadMemes();
</script>

</body>
</html>
