<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memes Davi | Oficial</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #020617; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --primary: #3b82f6; 
            --accent: #ef4444;
            --whatsapp: #25D366;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 10px;
            overflow-x: hidden;
        }

        .header { text-align: center; padding: 30px 0; }
        .header h1 { 
            margin: 0;
            font-size: 2.2rem;
            background: linear-gradient(90deg, #3b82f6, #a855f7); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Grade de Miniaturas */
        .meme-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 10px;
        }

        .meme-card { 
            background: var(--card); 
            border-radius: 15px; 
            overflow: hidden; 
            cursor: pointer; 
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Efeito de Clique e Hover */
        .meme-card:active { transform: scale(0.92); }
        
        .meme-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.3s ease;
        }

        .meme-card:hover img { transform: scale(1.1); }

        /* MODAL */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999;
            top: 0; left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.95); 
            align-items: center; 
            justify-content: center;
            flex-direction: column;
        }

        .modal-content { 
            width: 90vw;
            max-height: 70vh;
            object-fit: contain; 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }

        #memeTitle {
            margin: 20px 0;
            font-size: 1.3rem;
            color: #fff;
            text-align: center;
            padding: 0 20px;
        }

        .modal-buttons { 
            display: flex; 
            gap: 15px; 
        }

        .btn {
            padding: 12px 25px; 
            border: none; 
            border-radius: 30px;
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-share { background: var(--primary); color: white; }
        .btn-close { background: var(--accent); color: white; }
        .btn:active { transform: scale(0.9); }

        /* RODAPÉ ORGANIZADO */
        .footer { 
            text-align: center; 
            margin-top: 50px; 
            padding: 40px 20px;
            border-top: 1px solid rgba(255,255,255,0.1); 
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-btn {
            flex: 1;
            max-width: 150px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s;
            color: white;
        }

        .suggest-btn { background: #2563eb; }
        .refresh-btn { background: #1e293b; border: 1px solid #334155; }
        .whatsapp-btn {
            background: var(--whatsapp);
            max-width: 310px; /* Largura total dos dois botões de cima */
            margin: 0 auto 25px auto;
            display: block;
        }

        .profile-img { 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            border: 3px solid var(--primary); 
            margin-bottom: 10px; 
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @media (max-width: 360px) {
            .button-group { flex-direction: column; align-items: center; }
            .nav-btn { width: 100%; max-width: 250px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Memes 2 EPTI</h1>
</div>

<div id="memeContainer" class="meme-grid">
    </div>

<div id="memeModal" class="modal" onclick="if(event.target == this) closeModal()">
    <img id="imgFull" class="modal-content">
    <h3 id="memeTitle"></h3>
    <div class="modal-buttons">
        <button class="btn btn-share" onclick="shareMeme()">Enviar Link</button>
        <button class="btn btn-close" onclick="closeModal()">Voltar</button>
    </div>
</div>

<div class="footer">
    <div class="button-group">
        <a href="https://forms.gle/iCHjt7fbsiMbuN867" target="_blank" class="nav-btn suggest-btn">
            Sugerir Meme 🚀
        </a>
        <button onclick="window.location.reload(true)" class="nav-btn refresh-btn">
            Ver Novidades 🔄
        </button>
    </div>

    <a href="https://api.whatsapp.com/send?text=Confere os memes da EPTI aqui: https://davilindo77.github.io/memes-ctrl-ctrlv/" 
       target="_blank" class="nav-btn whatsapp-btn">
       Divulgar no WhatsApp 🟢
    </a>

    <img src="5021535940282886753.jpg" alt="Davi" class="profile-img">
    <p>APP FEITO POR DAVI</p>
    <small style="opacity: 0.6;">Versão 2.7 - 2026</small>
</div>

<script>
    let currentMeme = { url: '', titulo: '' };

    async function loadMemes() {
        try {
            const response = await fetch('memes.json?v=' + Date.now());
            const memes = await response.json();
            const container = document.getElementById('memeContainer');
            container.innerHTML = '';

            memes.forEach(meme => {
                const div = document.createElement('div');
                div.className = 'meme-card';
                div.innerHTML = `<img src="${meme.url}" alt="${meme.titulo}" crossorigin="anonymous" loading="lazy">`;
                div.onclick = () => openModal(meme.url, meme.titulo);
                container.appendChild(div);
            });
        } catch (error) {
            console.error("Erro ao carregar memes:", error);
        }
    }

    function openModal(url, titulo) {
        currentMeme = { url, titulo };
        document.getElementById('imgFull').src = url;
        document.getElementById('memeTitle').innerText = titulo;
        document.getElementById('memeModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('memeModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function shareMeme() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: currentMeme.titulo,
                    text: 'Olha esse meme no app do Davi!',
                    url: window.location.origin + window.location.pathname + currentMeme.url
                });
            } catch (err) { console.log("Erro ao compartilhar"); }
        } else {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + currentMeme.url);
            alert("Link copiado!");
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    loadMemes();
</script>

</body>
</html>
