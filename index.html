<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memes Ctrl+C Ctrl+V | Davi</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
            --primary: #3b82f6; --accent: #f43f5e;
        }
        
        body { 
            margin: 0; font-family: sans-serif; 
            background: var(--bg); color: var(--text); padding: 15px;
        }

        .header { text-align: center; padding: 20px; }
        .header h1 { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Grade de Miniaturas Pequenas */
        .meme-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); /* Imagens pequenas */
            gap: 10px; max-width: 1000px; margin: 0 auto; 
        }

        .meme-card { 
            background: var(--card); border-radius: 8px; overflow: hidden; 
            cursor: pointer; transition: transform 0.2s;
            aspect-ratio: 1 / 1; /* Deixa quadradinho */
        }
        
        .meme-card:active { transform: scale(0.95); }

        .meme-card img { 
            width: 100%; height: 100%; object-fit: cover; /* Corta para encaixar no quadrado */
        }

        /* Modal (A imagem que aumenta) */
        .modal {
            display: none; position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
            flex-direction: column;
        }

        .modal-content { max-width: 90%; max-height: 70%; border-radius: 10px; }

        .modal-buttons { margin-top: 20px; display: flex; gap: 15px; }

        .btn {
            padding: 12px 25px; border: none; border-radius: 25px;
            font-weight: bold; cursor: pointer; color: white;
        }
        .btn-share { background: var(--primary); }
        .btn-close { background: var(--accent); }

        .footer { text-align: center; margin-top: 50px; padding: 20px; opacity: 0.8; }
        .footer img { width: 50px; border-radius: 50%; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <h1>Memes Ctrl+C Ctrl+V</h1>
</div>

<div id="memeContainer" class="meme-grid">
    </div>

<div id="memeModal" class="modal">
    <img id="imgFull" class="modal-content">
    <h3 id="memeTitle" style="margin-top: 15px;"></h3>
    <div class="modal-buttons">
        <button class="btn btn-share" onclick="shareMeme()">Compartilhar</button>
        <button class="btn btn-close" onclick="closeModal()">Fechar</button>
    </div>
</div>

<div class="footer">
    <img src="https://github.com/Davilindo77.png">
    <p>APP FEITO POR DAVI</p>
</div>

<script>
    let currentMeme = { url: '', titulo: '' };

    async function loadMemes() {
        try {
            const response = await fetch('memes.json?v=' + Date.now());
            const memes = await response.json();
            const container = document.getElementById('memeContainer');
            container.innerHTML = '';

            memes.forEach(meme => {
                const div = document.createElement('div');
                div.className = 'meme-card';
                div.innerHTML = `<img src="${meme.url}" alt="${meme.titulo}" onerror="this.src='https://via.placeholder.com/150'">`;
                div.onclick = () => openModal(meme.url, meme.titulo);
                container.appendChild(div);
            });
        } catch (e) { console.error(e); }
    }

    function openModal(url, titulo) {
        currentMeme = { url, titulo };
        document.getElementById('imgFull').src = url;
        document.getElementById('memeTitle').innerText = titulo;
        document.getElementById('memeModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('memeModal').style.display = 'none';
    }

    // Função de Compartilhar
    async function shareMeme() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: currentMeme.titulo,
                    text: 'Olha esse meme no app do Davi!',
                    url: currentMeme.url
                });
            } catch (err) { console.log("Erro ao compartilhar"); }
        } else {
            alert("Link copiado: " + currentMeme.url);
        }
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    loadMemes();
</script>
</body>
</html>
