<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Davi | Hub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #0b0f1a;
            --card: #161b2b;
            --accent: #4f46e5;
            --text-main: #ffffff; 
            --text-sub: #64748b;
            --tab-bg: #1e293b;
        }

        /* Estilos para o Modo Claro */
        body.light-mode {
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #4f46e5;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --tab-bg: #e2e8f0;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            transition: background 0.3s, color 0.3s;
        }

        /* Menu de Navegação Superior */
        .nav-tabs {
            display: flex;
            background: var(--card);
            padding: 10px;
            gap: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 100;
        }

        .tab-link {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            background: transparent; color: var(--text-sub);
            font-weight: 600; font-size: 13px; cursor: pointer;
            transition: 0.2s;
        }

        .tab-link.active {
            background: var(--accent);
            color: white;
        }

        /* Containers de Conteúdo */
        .content-section {
            display: none; /* Esconde todas por padrão */
            height: calc(100vh - 70px);
            overflow-y: auto;
            padding: 20px 0;
            animation: fadeIn 0.3s ease;
        }

        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo da Galeria */
        .meme-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; padding: 0 15px;
        }
        .meme-card { 
            background: var(--card); border-radius: 15px; overflow: hidden; 
            position: relative; height: 160px; border: 1px solid rgba(0,0,0,0.1);
        }
        .meme-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Estilo da Referência (GRANDE DESTAQUE) */
        .ref-hero {
            text-align: center; padding: 60px 20px;
        }
        .profile-border-giant {
            display: inline-block; padding: 6px;
            background: linear-gradient(45deg, var(--accent), #ec4899);
            border-radius: 40px; margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.3);
        }
        .profile-img-giant {
            width: 180px; height: 180px; border-radius: 35px;
            object-fit: cover; border: 5px solid var(--bg);
        }
        .ref-hero h2 { font-size: 28px; margin: 0; }
        .ref-hero p { color: var(--text-sub); margin-top: 10px; font-size: 16px; }

        /* Estilo Outros e Modo Claro */
        .actions-list { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .big-btn {
            padding: 20px; border-radius: 20px; background: var(--card);
            color: var(--text-main); text-decoration: none; border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: space-between;
            font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content { max-width: 90%; max-height: 70vh; border-radius: 20px; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button class="tab-link active" onclick="openTab(event, 'galeria')">Galeria</button>
        <button class="tab-link" onclick="openTab(event, 'referencia')">Eu</button>
        <button class="tab-link" onclick="openTab(event, 'outros')">Menu</button>
    </nav>

    <section id="galeria" class="content-section active">
        <div id="memeContainer" class="meme-grid"></div>
    </section>

    <section id="referencia" class="content-section">
        <div class="ref-hero">
            <div class="profile-border-giant">
                <img src="5021535940282886753.jpg" alt="Davi" class="profile-img-giant">
            </div>
            <h2>Davi Oficial</h2>
            <p>Developer & Creator</p>
            <div style="margin-top: 30px; opacity: 0.5; font-size: 12px; letter-spacing: 2px;">ESTOQUE DE MEMES 2026</div>
        </div>
    </section>

    <section id="outros" class="content-section">
        <div class="actions-list">
            <button class="big-btn" onclick="toggleTheme()" style="background: var(--accent); color: white; border: none;">
                Modo Claro/Escuro <span>🌓</span>
            </button>
            <a href="https://forms.gle/iCHjt7fbsiMbuN867" target="_blank" class="big-btn">
                Sugerir Meme <span>➕</span>
            </a>
            <button onclick="window.location.reload(true)" class="big-btn">
                Atualizar App <span>🔄</span>
            </button>
            <a href="https://api.whatsapp.com/send?text=Confere o novo app do Davi!" target="_blank" class="big-btn" style="color: #25D366;">
                Compartilhar <span>💬</span>
            </a>
        </div>
    </section>

    <div id="memeModal" class="modal" onclick="closeModal()">
        <img id="imgFull" class="modal-content">
    </div>

<script>
    // Troca de Abas
    function openTab(evt, tabName) {
        let content = document.getElementsByClassName("content-section");
        for (let i = 0; i < content.length; i++) content[i].classList.remove("active");

        let tabs = document.getElementsByClassName("tab-link");
        for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");

        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Modo Claro
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    // Carregar Preferência de Tema
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    async function loadMemes() {
        try {
            const response = await fetch('memes.json');
            const memes = await response.json();
            const container = document.getElementById('memeContainer');
            container.innerHTML = '';
            memes.forEach(meme => {
                const div = document.createElement('div');
                div.className = 'meme-card';
                div.innerHTML = `<img src="${meme.url}" onclick="openModal('${meme.url}')">`;
                container.appendChild(div);
            });
        } catch (e) { }
    }

    function openModal(url) {
        document.getElementById('imgFull').src = url;
        document.getElementById('memeModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('memeModal').style.display = 'none';
    }

    loadMemes();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
