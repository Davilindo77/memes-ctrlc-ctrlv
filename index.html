<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memes Davi | Oficial</title>
    <link rel="manifest" href="manifest.json">
    <style>
       :root { 
    --bg: #0f172a;           /* Fundo azul marinho bem escuro */
    --card: #1e293b;         /* Cor do card */
    --accent: #6366f1;       /* Índigo moderno para detalhes */
    --text-main: #f1f5f9;    /* Branco acinzentado */
    --text-sub: #94a3b8;     /* Cinza para textos menores */
    --glass: rgba(255, 255, 255, 0.03); 
}

body { 
    margin: 0; 
    font-family: 'Inter', -apple-system, sans-serif; 
    background: var(--bg); 
    color: var(--text-main); 
    padding: 0;
    -webkit-font-smoothing: antialiased;
}

/* Header Minimalista */
.header { 
    padding: 60px 20px 30px; 
    text-align: center;
}

.header h1 { 
    margin: 0;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--text-main);
    text-transform: uppercase;
    opacity: 0.9;
}

/* Grade de Memes Profissional */
.meme-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
    gap: 16px; 
    max-width: 900px; 
    margin: 0 auto; 
    padding: 20px;
}

.meme-card { 
    background: var(--card); 
    border-radius: 20px; 
    overflow: hidden; 
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.08); /* Borda fininha estilo iPhone */
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.meme-card:active { 
    transform: scale(0.96); 
}

.meme-card img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    display: block;
    filter: brightness(0.9);
    transition: 0.4s;
}

.meme-card:hover img {
    filter: brightness(1.1);
    transform: scale(1.05);
}

/* Botões Modernos */
.button-group {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 30px 0;
    padding: 0 20px;
}

.nav-btn {
    flex: 1;
    max-width: 140px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    background: var(--card);
    color: var(--text-main);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.3s;
}

.nav-btn.primary {
    background: var(--accent);
    border: none;
}

.whatsapp-btn {
    background: transparent !important;
    border: 1px solid rgba(37, 211, 102, 0.3) !important;
    color: #25D366 !important;
    margin: 0 auto 40px !important;
    display: block;
    width: fit-content;
    padding: 12px 30px;
}

/* Rodapé Elegante */
.footer { 
    text-align: center; 
    padding: 60px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.2), transparent);
}

.profile-img { 
    width: 70px; 
    height: 70px; 
    border-radius: 24px; /* Quadrado arredondado estilo App Icon */
    margin-bottom: 15px; 
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.2);
}

.footer p { 
    font-size: 12px; 
    color: var(--text-sub); 
    letter-spacing: 2px;
    margin-bottom: 5px;
}

/* Modal Estilo Vidro */
.modal {
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px); /* Desfoca o fundo */
}

.modal-content { 
    width: 85vw;
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}
    
    </style>
</head>
<body>

<div class="header">
    <h1>Memes 2 EPTI</h1>
</div>

<div id="memeContainer" class="meme-grid">
    </div>

<div id="memeModal" class="modal" onclick="if(event.target == this) closeModal()">
    <img id="imgFull" class="modal-content">
    <h3 id="memeTitle"></h3>
    <div class="modal-buttons">
        <button class="btn btn-share" onclick="shareMeme()">Enviar Link</button>
        <button class="btn btn-close" onclick="closeModal()">Voltar</button>
    </div>
</div>

<div class="footer">
    <div class="button-group">
    <a href="https://forms.gle/iCHjt7fbsiMbuN867" target="_blank" class="nav-btn primary">
        Sugerir
    </a>
    <button onclick="window.location.reload(true)" class="nav-btn">
        Atualizar
    </button>
</div>

<a href="https://api.whatsapp.com/send?text=Confere os memes..." target="_blank" class="nav-btn whatsapp-btn">
   Compartilhar App
</a>

    <img src="5021535940282886753.jpg" alt="Davi" class="profile-img">
    <p>APP FEITO POR DAVI</p>
    <small style="opacity: 0.6;">Versão 2.7 - 2026</small>
</div>

<script>
    let currentMeme = { url: '', titulo: '' };

    async function loadMemes() {
    try {
        // Tenta buscar primeiro o arquivo puro (que o Service Worker conhece)
        const response = await fetch('memes.json');
        const memes = await response.json();
        const container = document.getElementById('memeContainer');
        container.innerHTML = '';

        memes.forEach(meme => {
            const div = document.createElement('div');
            div.className = 'meme-card';
            div.innerHTML = `<img src="${meme.url}" alt="${meme.titulo}" crossorigin="anonymous" loading="lazy">`;
            div.onclick = () => openModal(meme.url, meme.titulo);
            container.appendChild(div);
        });
    } catch (error) {
        console.error("Erro ao carregar memes:", error);
        // Se der erro (offline total), você pode até colocar um aviso aqui
        document.getElementById('memeContainer').innerHTML = '<p style="text-align:center">Conecte-se para ver novos memes!</p>';
    }
}

    function openModal(url, titulo) {
        currentMeme = { url, titulo };
        document.getElementById('imgFull').src = url;
        document.getElementById('memeTitle').innerText = titulo;
        document.getElementById('memeModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('memeModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function shareMeme() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: currentMeme.titulo,
                    text: 'Olha esse meme no app do Davi!',
                    url: window.location.origin + window.location.pathname + currentMeme.url
                });
            } catch (err) { console.log("Erro ao compartilhar"); }
        } else {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + currentMeme.url);
            alert("Link copiado!");
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    loadMemes();
</script>

</body>
</html>
