<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Davi | Memes Gallery</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #0b0f1a;
            --card: #161b2b;
            --accent: #4f46e5;
            --text-main: #ffffff; 
            --text-sub: #64748b;
        }

        /* TRAVA A TELA: Impede que o app balance para os lados */
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            overflow-x: hidden; /* Remove o espaço vazio na lateral */
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .header { 
            padding: 40px 20px 10px; 
            text-align: center;
        }

        .header span { 
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-sub);
            font-weight: 600;
        }

        /* GRADE DE MEMES: Ajustada para não empurrar a tela */
        .meme-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 10px; 
            max-width: 100%; 
            padding: 15px;
            box-sizing: border-box; /* Garante que o padding não aumente a largura */
        }

        .meme-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .meme-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        /* BOTÕES: Maiores e centralizados para parecer App */
        .button-group {
            display: flex;
            flex-direction: column; /* Botões um em cima do outro no celular fica mais profissional */
            gap: 10px;
            padding: 20px;
            align-items: center;
        }

        .nav-btn {
            width: 100%;
            max-width: 280px;
            padding: 16px; /* Botão maior para o dedo clicar fácil */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            background: var(--card);
            color: var(--text-main);
            text-align: center;
            transition: 0.2s;
        }

        .nav-btn.primary { background: var(--accent); border: none; }

        .whatsapp-btn {
            background: transparent !important;
            border: 1px solid rgba(37, 211, 102, 0.4) !important;
            color: #25D366 !important;
        }

        /* FOOTER */
        .footer { 
            text-align: center; 
            padding: 40px 20px;
        }

        .profile-container {
            display: inline-block;
            padding: 3px;
            background: linear-gradient(45deg, var(--accent), #ec4899);
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .profile-img { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            display: block;
            object-fit: cover;
            border: 2px solid var(--bg);
        }

        /* MODAL (ZOOM): Ajustado para não dar zoom infinito */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content { 
            max-width: 95%; /* Não deixa a imagem encostar na borda */
            max-height: 65vh; /* Limita a altura para sobrar espaço pros botões */
            object-fit: contain; /* Garante que a imagem inteira apareça */
            border-radius: 10px;
        }

        #memeTitle { margin: 15px 0; font-size: 14px; color: var(--text-sub); }

        .modal-buttons { 
            display: flex; 
            gap: 15px; 
            width: 90%; 
            justify-content: center; 
        }

        .btn-modal {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-share { background: var(--accent); color: white; }
        .btn-close { background: #334155; color: white; }

    </style>
</head>
<body>

<header class="header">
    <span>MEMES EPTI</span>
</header>

<div id="memeContainer" class="meme-grid"></div>

<div class="button-group">
    <a href="https://forms.gle/iCHjt7fbsiMbuN867" target="_blank" class="nav-btn primary">Sugerir Novo Meme</a>
    <button onclick="window.location.reload(true)" class="nav-btn">Atualizar Galeria</button>
    <a href="https://api.whatsapp.com/send?text=Confere os memes no app do Davi!" target="_blank" class="nav-btn whatsapp-btn">Compartilhar App</a>
</div>

<div id="memeModal" class="modal" onclick="if(event.target == this) closeModal()">
    <img id="imgFull" class="modal-content">
    <h3 id="memeTitle"></h3>
    <div class="modal-buttons">
        <button class="btn-modal btn-share" onclick="shareMeme()">Enviar Link</button>
        <button class="btn-modal btn-close" onclick="closeModal()">Voltar</button>
    </div>
</div>

<footer class="footer">
    <div class="profile-container">
        <img src="5021535940282886753.jpg" alt="Davi" class="profile-img">
    </div>
    <p style="letter-spacing: 2px; font-size: 12px;">DAVI • 2026</p>
</footer>

<script>
    let currentMeme = { url: '', titulo: '' };

    async function loadMemes() {
        try {
            const response = await fetch('memes.json');
            const memes = await response.json();
            const container = document.getElementById('memeContainer');
            container.innerHTML = '';

            memes.forEach(meme => {
                const div = document.createElement('div');
                div.className = 'meme-card';
                div.innerHTML = `<img src="${meme.url}" alt="${meme.titulo}">`;
                div.onclick = () => openModal(meme.url, meme.titulo);
                container.appendChild(div);
            });
        } catch (error) {
            document.getElementById('memeContainer').innerHTML = '<p style="text-align:center; color: var(--text-sub);">Offline</p>';
        }
    }

    function openModal(url, titulo) {
        currentMeme = { url, titulo };
        document.getElementById('imgFull').src = url;
        document.getElementById('memeTitle').innerText = titulo;
        document.getElementById('memeModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('memeModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function shareMeme() {
        const shareUrl = window.location.origin + window.location.pathname;
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Meme do Davi', url: shareUrl });
            } catch (err) {}
        } else {
            navigator.clipboard.writeText(shareUrl);
            alert("Link copiado!");
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    loadMemes();
</script>

</body>
</html>
